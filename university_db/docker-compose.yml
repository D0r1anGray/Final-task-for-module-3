services:
  configsvr:
    image: mongo:6.0
    container_name: configsvr
    command: mongod --configsvr --replSet configReplSet --port 27019 --dbpath /data/db
    volumes:
      - configsvr_data:/data/db
    networks:
      - mongo_net

  shard1:
    image: mongo:6.0
    container_name: shard1
    command: mongod --shardsvr --replSet shard1ReplSet --port 27018 --dbpath /data/db
    volumes:
      - shard1_data:/data/db
    networks:
      - mongo_net

  shard2:
    image: mongo:6.0
    container_name: shard2
    command: mongod --shardsvr --replSet shard2ReplSet --port 27018 --dbpath /data/db
    volumes:
      - shard2_data:/data/db
    networks:
      - mongo_net

  mongos:
    image: mongo:6.0
    container_name: mongos
    command: >
      mongos
      --configdb configReplSet/configsvr:27019
      --port 27017
      --bind_ip_all
    ports:
      - "27017:27017"
    depends_on:
      - configsvr
      - shard1
      - shard2
    networks:
      - mongo_net

volumes:
  configsvr_data:
  shard1_data:
  shard2_data:

networks:
  mongo_net:
    driver: bridge
